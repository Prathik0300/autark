<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Autark - Map + Plot Brush</title>
  <link rel="stylesheet" href="/src/autk-plot/map-d3-brush.css">
</head>
<body>
  <div id="app">
    <header class="page-header">
      <h1>Map + Plot Brush</h1>
      <p>Pick features on the map or brush the scatterplot to synchronize highlighted items.</p>
    </header>

    <div id="workspace">
      <section class="panel map-panel">
        <h2>Map View</h2>
        <div class="panel-body">
          <canvas></canvas>
        </div>
      </section>

      <section class="panel plot-panel">
        <h2>Scatterplot</h2>
        <div class="panel-body">
          <div id="plot">
            <div id="plotBody"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
<script type="module" src="/src/autk-plot/map-d3-brush.ts"></script>
</html>
